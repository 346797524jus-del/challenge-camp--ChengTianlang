spring:
  application:
    name: ai-code-helper
server:
  port: 8081
  servlet:
    context-path: /api
langchain4j:
  ollama:
    chat-model:
      base-url: ${AI_API_BASE_URL:https://api.deepseek.com}
      model-name: ${AI_MODEL_NAME:deepseek-v4-pro}
      api-key: ${OPENAI_API_KEY:}
    streaming-chat-model:
      base-url: ${AI_API_BASE_URL:https://api.deepseek.com}
      model-name: ${AI_MODEL_NAME:deepseek-v4-pro}
      api-key: ${OPENAI_API_KEY:}
    embedding-model:
      base-url: http://localhost:11434
      model-name: gemma4:e2b
  community:
    dashscope:
      chat-model:
        model-name: qwen-max
        api-key: <Your API Key>
      streaming-chat-model:
        model-name: qwen-max
        api-key: <Your API Key>
      embedding-model:
        model-name: text-embedding-v4
        api-key: <Your API Key>
bigmodel:
  api-key: <Your API Key>
