spring:
  application:
    name: ai-code-helper
server:
  port: 8081
  servlet:
    context-path: /api

# DeepSeek 兼容 OpenAI API，使用 langchain4j-open-ai 配置
langchain4j:
  open-ai:
    chat-model:
      base-url: ${AI_API_BASE_URL:https://api.deepseek.com}
      model-name: ${AI_MODEL_NAME:deepseek-v4-pro}
      api-key: ${OPENAI_API_KEY:}
      log-requests: true
      log-responses: true
    streaming-chat-model:
      base-url: ${AI_API_BASE_URL:https://api.deepseek.com}
      model-name: ${AI_MODEL_NAME:deepseek-v4-pro}
      api-key: ${OPENAI_API_KEY:}
